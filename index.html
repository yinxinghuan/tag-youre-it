    <meta name="apple-mobile-web-app-capable" content="yes" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Bangers&family=Knewave&family=Permanent+Marker&family=Archivo+Black&family=Inter:wght@600;800&display=swap"
      media="print"
      onload="this.media='all'"
    />

  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
